name: Fetch Crypto Market Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-crypto-market-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data
        run: |
          mkdir -p data

          curl -L --fail --max-time 30 --retry 2 --retry-delay 5 -s \
            "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=40&page=1&sparkline=false&price_change_percentage=24h" \
            -o data/market.json

          curl -L --fail --max-time 30 --retry 2 --retry-delay 5 -s \
            "https://api.alternative.me/fng/?limit=1" \
            -o data/feargreed.json

          curl -L --fail --max-time 30 --retry 2 --retry-delay 5 -s \
            "https://api.coingecko.com/api/v3/search/trending" \
            -o data/trending.json

          curl -L --fail --max-time 30 --retry 2 --retry-delay 5 -s \
            "https://api.coingecko.com/api/v3/global" \
            -o data/global.json

      - name: Generate gainers and losers
        run: |
          python3 <<'PY'
          import json

          with open("data/market.json", "r", encoding="utf-8") as f:
              coins = json.load(f)

          valid = [
              c for c in coins
              if c.get("price_change_percentage_24h") is not None
          ]

          gainers = sorted(
              valid,
              key=lambda c: c.get("price_change_percentage_24h", 0),
              reverse=True
          )[:10]

          losers = sorted(
              valid,
              key=lambda c: c.get("price_change_percentage_24h", 0)
          )[:10]

          with open("data/gainers.json", "w", encoding="utf-8") as f:
              json.dump(gainers, f, ensure_ascii=False, indent=2)

          with open("data/losers.json", "w", encoding="utf-8") as f:
              json.dump(losers, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit
        run: |
          git config user.name "cryptoradar-bot"
          git config user.email "bot@cryptoradar.local"
          git add data/
          git diff --staged --quiet || git commit -m "data: update"
          git push
