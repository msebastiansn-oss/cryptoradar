name: Fetch Crypto Market Data

on:
  schedule:
    - cron: '0 * * * *' # Corre una vez por hora como respaldo de seguridad
  workflow_dispatch:      # Permite que lo actives manualmente la primera vez

permissions:
  contents: write
  actions: write          # REQUERIDO para que el bot pueda volver a lanzar el workflow

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data
        run: |
          mkdir -p data
          curl -L -s "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=40&page=1&sparkline=false&price_change_percentage=24h" -o data/market.json
          curl -L -s "https://api.alternative.me/fng/?limit=1" -o data/feargreed.json
          curl -L -s "https://api.coingecko.com/api/v3/search/trending" -o data/trending.json
          curl -L -s "https://api.coingecko.com/api/v3/global" -o data/global.json

      - name: Commit
        run: |
          git config user.name "cryptoradar-bot"
          git config user.email "bot@cryptoradar.local"
          git add data/
          git diff --staged --quiet || git commit -m "data: update"
          git push

      - name: Esperar 15 minutos y relanzar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 900 # Espera 15 minutos (900 segundos)
          gh workflow run "Fetch Crypto Market Data" # Se vuelve a llamar a sí mismo

